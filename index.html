    var currentIndex = -1;
    var seededPool = [];
    var seededPointer = 0;
    var lastSeedValue = "";

    function stringToSeed(text) {
      var hash = 0;
      for (var i = 0; i < text.length; i++) {
        hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
      }
      return hash;
    }

    function createSeededRandom(seed) {
      return function () {
        seed = (seed * 1664525 + 1013904223) % 4294967296;
        return seed / 4294967296;
      };
    }

    function buildSeededPool(seedText) {
      if (sentences.length === 0) {
        return [];
      }

      var seed = stringToSeed(seedText);
      var random = createSeededRandom(seed);
      var indexes = [];

      for (var i = 0; i < sentences.length; i++) {
        indexes.push(i);
      }

      for (var j = indexes.length - 1; j > 0; j--) {
        var swapIndex = Math.floor(random() * (j + 1));
        var temp = indexes[j];
        indexes[j] = indexes[swapIndex];
        indexes[swapIndex] = temp;
      }

      return indexes.slice(0, Math.min(5, indexes.length));
    }

    function showRandomSentence() {
      if (sentences.length === 0) {
        document.getElementById("lithuanianSentence").textContent = "No sentences added yet.";
        document.getElementById("englishSentence").textContent = "Please add sentences to the array.";
        return;
      }

      var seedValue = document.getElementById("seedInput").value.trim();
      var selectedIndex;

      if (seedValue !== "") {
        if (seedValue !== lastSeedValue) {
          seededPool = buildSeededPool(seedValue);
          seededPointer = 0;
          lastSeedValue = seedValue;
        }

        if (seededPool.length === 0) {
          return;
        }

        selectedIndex = seededPool[seededPointer];
        seededPointer = (seededPointer + 1) % seededPool.length;
      } else {
        lastSeedValue = "";
        seededPool = [];
        seededPointer = 0;

        if (sentences.length === 1) {
          selectedIndex = 0;
        } else {
          do {
            selectedIndex = Math.floor(Math.random() * sentences.length);
          } while (selectedIndex === currentIndex);
        }
      }

      currentIndex = selectedIndex;
      var sentence = sentences[selectedIndex];

      document.getElementById("lithuanianSentence").textContent = sentence.lithuanian;
      document.getElementById("englishSentence").textContent = sentence.english;
    }

    document.getElementById("nextButton").addEventListener("click", showRandomSentence);

    document.getElementById("seedInput").addEventListener("input", function () {
      lastSeedValue = "";
    });

    showRandomSentence();
